server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri @asset_missing;
    }

    # Asset de build antigo (HTML velho em cache de webview): devolve stub JS
    # que recarrega a página uma vez, em vez de 404 que vira tela branca
    location @asset_missing {
        default_type application/javascript;
        add_header Cache-Control "no-store";
        return 200 "try{if(!sessionStorage.getItem('__staleAsset')){sessionStorage.setItem('__staleAsset','1');location.reload(!0)}}catch(e){location.reload()}";
    }

    # SPA fallback — HTML nunca em cache (webviews WhatsApp/Instagram)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }
}
